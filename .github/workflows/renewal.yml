name: Euserv VPS Renewal
on:
  schedule:
    - cron: 0 0 14 4 *
  workflow_dispatch: null
jobs:
  renew-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: venv
          key: ${{ runner.os }}-venv-${{ hashFiles('requirements.txt') }}
      - name: Create venv and Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run renewal script with retry
        id: renewal
        env:
          EUSERV_USERNAME: ${{ secrets.EUSERV_USERNAME }}
          EUSERV_PASSWORD: ${{ secrets.EUSERV_PASSWORD }}
          EUSERV_2FA: ${{ secrets.EUSERV_2FA }}
          CAPTCHA_USERID: ${{ secrets.CAPTCHA_USERID }}
          CAPTCHA_APIKEY: ${{ secrets.CAPTCHA_APIKEY }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          source venv/bin/activate

          MAX_RETRIES=3
          RETRY_DELAY=1800  # 30分钟 (秒)

          for i in $(seq 1 $MAX_RETRIES); do
            echo "========================================="
            echo "🔄 尝试 $i/$MAX_RETRIES - $(date)"
            echo "========================================="
            
            set +e  # 允许非零退出码
            python Euserv_Renewal.py
            EXIT_CODE=$?
            set -e
            
            # 退出码处理
            case $EXIT_CODE in
              0)
                echo "✅ 续约成功或无需续约"
                exit 0
                ;;
              2)
                echo "⏭️ 未到续约日期，跳过执行 (动态调度将更新 cron)"
                # 正常退出，让后续步骤执行动态调度更新
                exit 0
                ;;
              *)
                echo "❌ 续约失败 (退出码: $EXIT_CODE)"
                if [ $i -lt $MAX_RETRIES ]; then
                  echo "⏳ 等待 30 分钟后重试..."
                  sleep $RETRY_DELAY
                fi
                ;;
            esac
          done

          echo "💥 所有 $MAX_RETRIES 次重试均失败"
          exit 1
      - name: Update schedule for next renewal
        if: steps.renewal.outputs.next_cron != ''
        uses: gr2m/set-cron-schedule-action@v2
        with:
          token: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE }}
          cron: ${{ steps.renewal.outputs.next_cron }}
          workflow: renewal.yml
          message: "ci(renewal): 更新下次续约时间为 ${{ steps.renewal.outputs.next_date }}"
      - name: Upload failed captcha for debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: captcha-failed
          path: captcha_failed.png
          if-no-files-found: ignore
          retention-days: 7
